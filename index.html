<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль питомца</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0b1a13 0%, #080d0b 100%); 
            color: #e2e8f0; 
            padding: 20px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
        }
        .container { display: flex; gap: 24px; max-width: 1000px; width: 100%; margin: 20px auto; }
        
        .glass-card { 
            background: rgba(24, 28, 26, 0.85); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px; 
            border: 1px solid rgba(46, 213, 115, 0.25); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            padding: 25px;
            box-sizing: border-box;
        }

        .left-column { width: 35%; display: flex; flex-direction: column; gap: 20px; }
        .main-card { text-align: center; }
        
        .avatar-placeholder { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #2ed573 0%, #10ac84 100%); 
            margin: 0 auto 15px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 50px; 
            box-shadow: 0 0 25px rgba(46, 213, 115, 0.3); 
            border: 3px solid #ffffff; 
        }
        
        h1 { margin: 10px 0 2px 0; color: #ffffff; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
        .breed { color: #2ed573; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        
        .contacts-block { background: rgba(20, 24, 22, 0.7); border-radius: 16px; padding: 18px; text-align: left; border: 1px solid rgba(255,255,255,0.03); }
        .contacts-title { color: #2ed573; font-size: 15px; font-weight: bold; margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; }
        .contact-item { font-size: 14px; margin-bottom: 12px; color: #f7fafc; line-height: 1.5; }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-item strong { color: #a0aec0; font-weight: 600; display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            background: linear-gradient(90deg, #2ed573 0%, #10ac84 100%); 
            color: #ffffff; 
            padding: 18px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 16px; 
            margin-top: 20px; 
            transition: 0.3s; 
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4); 
            letter-spacing: 0.5px; 
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(46, 213, 115, 0.6); }

        .right-column { width: 65%; }
        .info-container { display: flex; flex-direction: column; gap: 24px; }
        
        .info-section { border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 20px; }
        .info-section:last-child { border-bottom: none; padding-bottom: 0; }
        
        .section-header { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; color: #ffffff; }
        .section-header span { color: #2ed573; font-size: 20px; }
        
        .sub-block { margin-bottom: 14px; font-size: 15px; line-height: 1.6; }
        .sub-block:last-child { margin-bottom: 0; }
        .sub-title { color: #2ed573; font-weight: 700; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sub-text { color: #edf2f7; }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 10px; margin: 0; }
            .left-column, .right-column { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container" id="app-container">
        <p style="text-align:center; width:100%; color:#fff;">Загрузка профиля питомца...</p>
    </div>

    <script>
        // Жестко прописанная база без сложных проверок и внешних запросов
        const database = {
            "id001": {
                name: "Рекс",
                breed: "Золотистый ретривер",
                owner: "Иван Петров +79000000000",
                phone2: "Мария +79000000001",
                address: "г. Москва, ул. Тверская, д. 15",
                character: "Очень дружелюбный и active-пес. Любит людей и детей. Знает команды.",
                habits: "Выгул 3 раза в день. Приучен к туалету на улице. Ест 2 раза в день.",
                fears: "Боится салютов и громких звуков. Не трогайте еду, когда он кушает.",
                ration: "Сухой корм Royal Canin Maxi Adult (200г утром и 200г вечером).",
                forbidden: "Шоколад, виноград, лук, кости, любая еда со стола.",
                allergy: "Нет известных аллергий.",
                chronic: "Нет хронических болезней.",
                medicines: "Лекарства не принимает.",
                chip: "900111222333444",
                phoneCall: "79000000000"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        // Берем ID и переводим его в нижний регистр, убирая пробелы
        const rawId = urlParams.get('id');
        const dogId = rawId ? rawId.trim().toLowerCase() : "";

        if (!dogId || !database[dogId]) {
            document.getElementById('app-container').innerHTML = '<h3 style="text-align:center; color:#fff; width:100%;">Питомец не найден в базе данных</h3>';
        } else {
            const dog = database[dogId];

            document.getElementById('app-container').innerHTML = `
                <div class="left-column">
                    <div class="glass-card main-card">
                        <div class="avatar-placeholder">🐾</div>
                        <h1>${dog.name}</h1>
                        <div class="breed">${dog.breed}</div>
                        
                        <div class="contacts-block">
                            <div class="contacts-title">🚨 В экстренной ситуации</div>
                            <div class="contact-item"><strong>Контакты:</strong> ${dog.owner}</div>
                            <div class="contact-item"><strong>Доп. связь:</strong> ${dog.phone2}</div>
                            <div class="contact-item"><strong>Адрес дома:</strong> ${dog.address}</div>
                        </div>
                        
                        <a href="tel:${dog.phoneCall}" class="btn">📞 ПОЗВОНИТЬ ДОМОЙ</a>
                    </div>
                </div>

                <div class="right-column">
                    <div class="glass-card info-container">
                        <div class="info-section">
                            <div class="section-header"><span>🧠</span> Поведение и уход</div>
                            <div class="sub-block">
                                <div class="sub-title">Характер:</div>
                                <div class="sub-text">${dog.character}</div>
                            </div>
                            <div class="sub-block">
                                <div class="sub-title">Привычки:</div>
                                <div class="sub-text">${dog.habits}</div>
                            </div>
                            <div class="sub-block">
                                <div class="sub-title">Страхи / Стресс:</div>
                                <div class="sub-text">${dog.fears}</div>
                            </div>
                        </div>

                        <div class="info-section">
                            <div class="section-header"><span>🥗</span> Кормление</div>
                            <div class="sub-block">
                                <div class="sub-title">Рацион:</div>
                                <div class="sub-text">${dog.ration}</div>
                            </div>
                            <div class="sub-block">
                                <div class="sub-title" style="color:#ff4757;">⚠️ Категорически запрещено:</div>
                                <div class="sub-text" style="color:#ff6b6b; font-weight:600;">${dog.forbidden}</div>
                            </div>
                        </div>

                        <div class="info-section">
                            <div class="section-header"><span>🏥</span> Медицинская карта</div>
                            <div class="sub-block">
                                <div class="sub-title">Аллергии и особенности:</div>
                                <div class="sub-text">${dog.allergy}</div>
                            </div>
                            <div class="sub-block">
                                <div class="sub-title">Хронические заболевания / Лекарства:</div>
                                <div class="sub-text">${dog.chronic} / ${dog.medicines}</div>
                            </div>
                            <div class="sub-block">
                                <div class="sub-title">Номер микрочипа:</div>
                                <div class="sub-text" style="font-family:monospace; font-size:15px; color:#a0aec0;">${dog.chip}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>

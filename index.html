<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль питомца</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 30px 20px; max-width: 360px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #2e2e2e; }
        img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid #00bcd4; margin-bottom: 15px; }
        h1 { margin: 10px 0 5px 0; color: #ffffff; font-size: 24px; }
        p { margin: 12px 0; font-size: 15px; line-height: 1.4; text-align: left; background: #262626; padding: 10px 15px; border-radius: 10px; }
        strong { color: #00bcd4; display: block; margin-bottom: 3px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .btn { display: block; background: #00bcd4; color: #000000; padding: 16px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: 25px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,188,212,0.4); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card" id="profile">
        <p style="text-align:center;">Загрузка данных питомца...</p>
    </div>

    <script>
        const PUBLIC_URL = "https://yandex.ru";

        const urlParams = new URLSearchParams(window.location.search);
        const dogId = urlParams.get('id');

        if (!dogId) {
            document.getElementById('profile').innerHTML = '<h3 style="text-align:center;">Ошибка: ID адресника не указан</h3>';
        } else {
            // Запрашиваем у Яндекса прямую ссылку на скачивание файла XLSX
            fetch(`https://yandex.net{encodeURIComponent(PUBLIC_URL)}`)
            .then(res => res.json())
            .then(data => {
                // Запрашиваем содержимое файла
                return fetch(data.href);
            })
            .then(res => res.arrayBuffer())
            .then(buffer => {
                // Переводим бинарный XLSX в текст для поиска
                const decoder = new TextDecoder('utf-8');
                const text = decoder.decode(buffer);
                
                // Простой поиск ID в текстовом потоке файла
                const index = text.toLowerCase().indexOf(dogId.toLowerCase());
                if (index !== -1) {
                    // Если ID найден, выводим данные (для теста берем Рекса)
                    document.getElementById('profile').innerHTML = `
                        <img src="https://placeholder.com" alt="Рекс">
                        <h1>Рекс</h1>
                        <p><strong>Контакты хозяина</strong>+79000000000</p>
                        <p><strong>Адрес дома</strong>Москва, Тверская 15</p>
                        <p><strong>Особенности и питание</strong>Сухой корм Royal Canin</p>
                        <a href="tel:+79000000000" class="btn">📞 ПОЗВОНИТЬ ХОЗЯИНУ</a>
                    `;
                } else {
                    document.getElementById('profile').innerHTML = '<h3 style="text-align:center;">Питомец с таким ID не найден</h3>';
                }
            })
            .catch(() => {
                document.getElementById('profile').innerHTML = '<h3 style="text-align:center;">Ошибка чтения базы данных</h3>';
            });
        }
    </script>
</body>
</html>
